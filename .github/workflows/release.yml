name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,appimage
            arch: amd64
          - os: windows-latest
            bundles: nsis,msi
            arch: x64
          - os: macos-latest
            bundles: dmg,app
            arch: universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oweemedev/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: oweemedev/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libssh2-1-dev \
            fuse \
            libfuse2

      - name: Setup macOS universal binary
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: oweemedev
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: oweemedev
          tagName: ${{ github.ref_name }}
          releaseName: OweemeIDE ${{ github.ref_name }}
          releaseBody: |
            ## OweemeIDE ${{ github.ref_name }}

            IDE de escritorio ligero construido con Tauri 2 + Vue 3 + Rust.

            ### Instaladores disponibles
            - **Linux**: `.deb` (Debian/Ubuntu/Neon) y `.AppImage` (universal)
            - **Windows**: `.exe` (NSIS installer) y `.msi`
            - **macOS**: `.dmg` (universal — Intel + Apple Silicon)

            ### Instalación rápida
            **Linux (deb):**
            ```bash
            sudo dpkg -i OweemeIDE_*.deb
            ```
            **Linux (AppImage):**
            ```bash
            chmod +x OweemeIDE_*.AppImage && ./OweemeIDE_*.AppImage
            ```
            **Windows:** Ejecutar el `.exe` o `.msi` como administrador.
            **macOS:** Abrir el `.dmg` y arrastrar OweemeIDE a Aplicaciones.
          releaseDraft: true
          prerelease: false
          args: >-
            --bundles ${{ matrix.bundles }}
            ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}
